<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">جمعية التحالف للإغاثة والتنمية</title>
  <desc id="logoDesc">شعار جمعية التحالف للإغاثة والتنمية باللغتين العربية والإنجليزية مع رمز حلزوني متدرج.</desc>
  <defs>
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#77c7d7" />
      <stop offset="55%" stop-color="#56d6b5" />
      <stop offset="100%" stop-color="#0f5f95" />
    </linearGradient>
    <style>
      .arabic {
        fill: #0b4f8a;
        font-family: "Alexandria", "Cairo", "Segoe UI", Arial, sans-serif;
        font-size: 68px;
        font-weight: 800;
      }
      .english {
        fill: #0b4f8a;
        font-family: "Alexandria", "Segoe UI", Arial, sans-serif;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
    </style>
    <path id="petal" d="M0 -94C49 -90 87 -52 92 -4C95 44 67 82 0 96C24 48 24 -46 0 -94Z" />
  </defs>

  <g transform="translate(1190 154)">
    <g opacity="0.98">
      <g fill="url(#petalGradient)">
        <use href="#petal" transform="rotate(0)" />
        <use href="#petal" transform="rotate(60)" />
        <use href="#petal" transform="rotate(120)" />
        <use href="#petal" transform="rotate(180)" />
        <use href="#petal" transform="rotate(240)" />
        <use href="#petal" transform="rotate(300)" />
      </g>
      <circle r="52" fill="#ffffff" />
      <circle r="44" fill="#f7fffd" opacity="0.7" />
    </g>
  </g>

  <text class="arabic" x="1030" y="128" text-anchor="end">جمعية التحالف للإغاثة والتنمية</text>
  <text class="english" x="1030" y="212" text-anchor="end">Altahaluf Association For Relief &amp; Development</text>
</svg>
